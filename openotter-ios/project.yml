name: openotter
options:
  bundleIdPrefix: com.openotter
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_COMPILATION_MODE: "singlefile"
      GCC_OPTIMIZATION_LEVEL: "0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: "wholemodule"
      GCC_OPTIMIZATION_LEVEL: "s"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

targets:
  openotter:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "**/*.md"
          - "Planner/Safety/FirmwareSafetyEvent.swift"
      - path: Resources/Assets.xcassets
      - path: VERSION
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.openotter.app
        MARKETING_VERSION: ${APP_VERSION}
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 3QG94NJJQQ
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: Resources/openotter.entitlements
      properties: {}

  openotterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - "Planner/FirmwareSafetyEventTests.swift"
    dependencies:
      - target: openotter
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
