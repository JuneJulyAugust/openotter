name: ESCScanner

options:
  bundleIdPrefix: com.openotter

settings:
  base:
    SWIFT_VERSION: 5.0

targets:
  ESCScanner:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - esc_app.swift
      - Sources
    resources:
      - Resources
    info:
      path: Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openotter.escscanner
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: We need Bluetooth to connect to the ESC telemetry.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: ESC_SCANNER_APP
