name: metalbot
options:
  bundleIdPrefix: com.metalbot
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  metalbot:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.metalbot.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 3QG94NJJQQ
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: Resources/metalbot.entitlements
      properties: {}
